short_bio: >-
  <p>I am a PhD in Electrical Engineering specializing in wireless communications, artificial intelligence, and large-scale optimization. My research focuses on reinforcement learning and data-driven approaches for decision-making in complex, high-dimensional and distributed systems, with applications to next-generation (5G/6G) communication networks.
</p>
<p>I am particularly interested in designing scalable, robust, and efficient algorithms for resource allocation under uncertainty, as well as in bridging learning-based methods with classical optimization techniques. More recently, I have developed an interest in integrating reinforcement learning with large language models for intelligent decision support in complex systems.
</p>
<p>Alongside my research, I am a university lecturer and trainer, delivering practical courses in data science, Python, and software development. I enjoy translating complex theoretical concepts into real-world applications and helping learners build strong, industry-relevant skills.
</p>
<p>
I am open to collaborations in AI, optimization, and intelligent systems, as well as opportunities to contribute to impactful research and innovation.
</p>
